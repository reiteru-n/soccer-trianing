<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 月桂樹（左） -->
  <g fill="#C9A84C" opacity="0.9">
    <ellipse cx="13" cy="35" rx="4.5" ry="7.5" transform="rotate(-40 13 35)"/>
    <ellipse cx="9"  cy="46" rx="4.5" ry="7.5" transform="rotate(-20 9 46)"/>
    <ellipse cx="8"  cy="58" rx="4.5" ry="7.5" transform="rotate(0 8 58)"/>
    <ellipse cx="11" cy="69" rx="4.5" ry="7.5" transform="rotate(18 11 69)"/>
    <ellipse cx="18" cy="78" rx="4"   ry="6.5" transform="rotate(35 18 78)"/>
  </g>
  <!-- 月桂樹（右） -->
  <g fill="#C9A84C" opacity="0.9">
    <ellipse cx="87" cy="35" rx="4.5" ry="7.5" transform="rotate(40 87 35)"/>
    <ellipse cx="91" cy="46" rx="4.5" ry="7.5" transform="rotate(20 91 46)"/>
    <ellipse cx="92" cy="58" rx="4.5" ry="7.5" transform="rotate(0 92 58)"/>
    <ellipse cx="89" cy="69" rx="4.5" ry="7.5" transform="rotate(-18 89 69)"/>
    <ellipse cx="82" cy="78" rx="4"   ry="6.5" transform="rotate(-35 82 78)"/>
  </g>
  <!-- 月桂樹 茎 -->
  <path d="M28 85 Q50 95 72 85" fill="none" stroke="#C9A84C" stroke-width="2.5" opacity="0.9"/>

  <!-- 盾：金アウトライン -->
  <path d="M50 10 L78 22 L78 58 Q78 80 50 92 Q22 80 22 58 L22 22 Z" fill="#C9A84C"/>
  <!-- 盾：白内側 -->
  <path d="M50 13 L75 24 L75 58 Q75 78 50 89 Q25 78 25 58 L25 24 Z" fill="#ffffff"/>

  <!-- 盾内：左上 赤 -->
  <path d="M25 24 L75 24 L75 55 L25 55 Z" fill="#CC0000" clip-path="url(#shield-clip)"/>
  <!-- 盾内：右上 白 diagonal split -->
  <path d="M50 24 L75 24 L75 55 L50 55 Z" fill="#ffffff"/>
  <!-- 盾内：下部 青 -->
  <path d="M25 55 L75 55 L75 58 Q75 78 50 89 Q25 78 25 58 Z" fill="#0033A0"/>

  <!-- 対角スプリット線 -->
  <line x1="50" y1="24" x2="75" y2="55" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- アンカー十字（金） -->
  <rect x="46" y="22" width="8" height="44" rx="2" fill="#C9A84C"/>
  <rect x="32" y="34" width="36" height="8" rx="2" fill="#C9A84C"/>
  <!-- アンカー頭の王冠ノブ -->
  <circle cx="50" cy="21" r="4" fill="#C9A84C"/>
  <!-- アンカー底部 水平バー -->
  <path d="M36 64 Q50 60 64 64" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
  <!-- アンカー中心 白抜き -->
  <rect x="48" y="30" width="4" height="20" rx="1" fill="#1a1a1a" opacity="0.3"/>

  <!-- サッカーボール（小） -->
  <circle cx="32" cy="44" r="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M32 38 L29 43 L32 47 L35 43 Z" fill="#1a1a1a"/>
  <path d="M28 43 L32 47 L30 50" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>

  <!-- カモメ（右側 簡略） -->
  <path d="M63 38 Q66 35 70 37" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M63 42 Q67 39 71 41" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64 46 Q68 43 72 45" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 下部バナー（青） -->
  <path d="M18 76 Q50 70 82 76 L78 86 Q50 80 22 86 Z" fill="#0033A0"/>
  <!-- バナー両端 -->
  <path d="M18 76 L22 86 L14 90 L10 82 Z" fill="#0033A0"/>
  <path d="M82 76 L78 86 L86 90 L90 82 Z" fill="#0033A0"/>
  <!-- Yokohama F·Marinos テキスト -->
  <text x="50" y="83" text-anchor="middle" font-size="6.5" fill="#ffffff" font-family="Georgia,serif" font-weight="700" letter-spacing="0.3">Yokohama F·Marinos</text>

  <clipPath id="shield-clip">
    <path d="M25 24 L75 24 L75 58 Q75 78 50 89 Q25 78 25 58 Z"/>
  </clipPath>
</svg>
