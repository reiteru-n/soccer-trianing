name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
    paths-ignore:
      - 'public/app.apk'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Stage APK to public/
        run: |
          mkdir -p public
          cp android/app/build/outputs/apk/debug/app-debug.apk public/app.apk
          ls -la public/app.apk

      - name: Commit APK back to master
        run: |
          git config user.email 'noreply@anthropic.com'
          git config user.name 'Claude (APK Build)'
          git add public/app.apk
          if git diff --staged --quiet; then
            echo "No APK changes"
            exit 0
          fi
          git commit -m "build: Fire TV用 APK 更新 (run #${{ github.run_number }}) [skip ci]"
          git push
