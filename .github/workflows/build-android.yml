name: Build Android APK
# Re-trigger after YAML fix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Show project structure
        run: find android -maxdepth 4 -type f | head -50

      - name: Verify Android project
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== android/ contents ==="
          ls -la android/
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo "=== settings.gradle ==="
          cat android/settings.gradle

      - name: Build debug APK
        id: gradle_build
        working-directory: android
        run: |
          set -o pipefail
          gradle --version
          gradle tasks --no-daemon 2>&1 | head -80
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          echo "EXIT=$?"

      - name: Dump gradle log tail to summary (always)
        if: always()
        run: |
          {
            echo "## Gradle build log (last 200 lines)"
            echo '```'
            tail -200 /tmp/gradle-build.log 2>/dev/null || echo "no log"
            echo '```'
            echo "## Failures/Errors grep"
            echo '```'
            grep -nE "FAILURE|BUILD FAILED|What went wrong|Caused by|error:|cannot find|Could not|Task :" /tmp/gradle-build.log 2>/dev/null | head -80 || echo "nothing"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log

      - name: Commit build log to repo (debug)
        if: always()
        run: |
          mkdir -p .github/build-logs
          cp /tmp/gradle-build.log ".github/build-logs/run-${{ github.run_number }}.log" 2>/dev/null || echo "no log"
          git config user.email 'noreply@anthropic.com'
          git config user.name 'Claude (APK Build)'
          git add .github/build-logs/
          if ! git diff --staged --quiet; then
            git commit -m "debug: build log run #${{ github.run_number }} [skip ci]"
            git push || echo "push failed (non-fatal)"
          fi

      - name: Find and stage APK to public/
        if: always()
        run: |
          mkdir -p public
          {
            echo "## Find APK files"
            echo "### android directory tree:"
            echo '```'
            find android -maxdepth 5 -type d 2>/dev/null
            echo '```'
            echo "### All APK files:"
            echo '```'
            find android -name "*.apk" 2>/dev/null || echo "none"
            echo '```'
            echo "### android/app/build directory:"
            echo '```'
            ls -la android/app/build 2>/dev/null || echo "no build dir"
            echo '```'
            echo "### android/app/build/outputs (recursive):"
            echo '```'
            ls -laR android/app/build/outputs 2>/dev/null || echo "no outputs dir"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          APK=$(find android -name "*.apk" 2>/dev/null | grep -i debug | head -1)
          [ -z "$APK" ] && APK=$(find android -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK file produced anywhere under android/"
            exit 1
          fi
          cp "$APK" public/app.apk
          ls -la public/app.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Commit APK back to master
        run: |
          git config user.email 'noreply@anthropic.com'
          git config user.name 'Claude (APK Build)'
          git add public/app.apk
          if git diff --staged --quiet; then
            echo "No APK changes"
            exit 0
          fi
          git commit -m "build: Fire TV用 APK 更新 (run #${{ github.run_number }}) [skip ci]"
          git push
