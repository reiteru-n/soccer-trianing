name: Build Android APK
# Re-trigger after YAML fix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Show project structure
        run: find android -maxdepth 4 -type f | head -50

      - name: Build debug APK
        id: gradle_build
        working-directory: android
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/gradle-build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          tail -200 /tmp/gradle-build.log > /tmp/gradle-tail.log
          exit ${PIPESTATUS[0]}

      - name: Show error tail on failure
        if: failure()
        run: |
          echo "==== LAST 200 LINES OF GRADLE OUTPUT ===="
          cat /tmp/gradle-tail.log || echo "no tail"
          echo "==== FAILURE GREP ===="
          grep -nE "FAILURE|BUILD FAILED|What went wrong|Caused by|error:|cannot find|Could not" /tmp/gradle-build.log | head -50 || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log

      - name: Find and stage APK to public/
        if: always()
        run: |
          mkdir -p public
          echo "==== android/ tree (depth 4) ===="
          find android -maxdepth 4 -type d 2>/dev/null
          echo "==== ALL APK files anywhere ===="
          find android -name "*.apk" 2>/dev/null | tee /tmp/apk-list.txt
          echo "==== android/app/build (if exists) ===="
          ls -la android/app/build 2>/dev/null || echo "no build dir"
          echo "==== android/app/build/outputs (if exists) ===="
          ls -laR android/app/build/outputs 2>/dev/null || echo "no outputs dir"
          APK=$(find android -name "*.apk" 2>/dev/null | grep -i debug | head -1)
          [ -z "$APK" ] && APK=$(find android -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK file produced anywhere under android/"
            exit 1
          fi
          echo "Selected APK: $APK"
          cp "$APK" public/app.apk
          ls -la public/app.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Commit APK back to master
        run: |
          git config user.email 'noreply@anthropic.com'
          git config user.name 'Claude (APK Build)'
          git add public/app.apk
          if git diff --staged --quiet; then
            echo "No APK changes"
            exit 0
          fi
          git commit -m "build: Fire TV用 APK 更新 (run #${{ github.run_number }}) [skip ci]"
          git push
