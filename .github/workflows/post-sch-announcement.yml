name: post-sch-announcement
on:
  push:
    paths:
      - '.github/workflows/post-sch-announcement.yml'
      - '.github/announcements/*.json'
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post announcement to Upstash Redis
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os, glob

          url   = os.environ["UPSTASH_URL"]
          token = os.environ["UPSTASH_TOKEN"]
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def redis_get(key):
              req = urllib.request.Request(f"{url}/get/{key}", headers=headers)
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read())
              raw = data.get("result")
              return json.loads(raw) if raw else []

          def redis_set(key, value):
              body = json.dumps(value, ensure_ascii=False).encode()
              req = urllib.request.Request(f"{url}/set/{key}", data=body, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          files = sorted(glob.glob(".github/announcements/*.json"))
          if not files:
              print("No announcement files found")
              exit(0)

          current = redis_get("sch:announcements")
          id_to_idx = {a["id"]: i for i, a in enumerate(current)}

          new_anns = []
          for f in sorted(files, reverse=True):  # 新しいファイルが先頭になるよう逆順
              ann = json.load(open(f, encoding="utf-8"))
              if ann["id"] in id_to_idx:
                  current[id_to_idx[ann["id"]]] = ann
                  print(f"UPDATE: {ann['title']}")
              else:
                  new_anns.append(ann)
                  print(f"ADD: {ann['title']}")

          # 新規は先頭に追加（追加順を保持、ソートしない）
          result_list = new_anns + current
          result = redis_set("sch:announcements", result_list)
          print(f"Saved {len(result_list)} announcements. Result: {result}")
          PYEOF
