name: seed-expedition
on:
  push:
    paths:
      - '.github/workflows/seed-expedition.yml'
jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 90
      - name: Post expedition announcement
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            curl -sf https://soccer-trianing.vercel.app/api/sch/seed-expedition && break
            echo "Retrying in 20s..."
            sleep 20
          done
